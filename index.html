<!DOCTYPE html>
<html>
<head>
<style>
body{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#f2f2f2;
}

.minion{
  width:200px;
  height:350px;
  background:yellow;
  border-radius:100px;
  position:relative;
}

.eye{
  width:80px;
  height:80px;
  background:white;
  border:8px solid gray;
  border-radius:50%;
  position:absolute;
  top:50px;
  left:55px;
}

.pupil{
  width:30px;
  height:30px;
  background:black;
  border-radius:50%;
  position:absolute;
  top:25px;
  left:25px;
}

.mouth{
  width:80px;
  height:40px;
  border-bottom:5px solid black;
  border-radius:0 0 50px 50px;
  position:absolute;
  top:170px;
  left:60px;
}

.pant{
  width:200px;
  height:100px;
  background:blue;
  position:absolute;
  bottom:0;
  border-radius:0 0 100px 100px;
}
</style>
</head>

<body>

<div class="minion">
  <div class="eye">
    <div class="pupil"></div>
  </div>

  <div class="mouth"></div>

  <div class="pant"></div>
</div>

</body>
</html>
