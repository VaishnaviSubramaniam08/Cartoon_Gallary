<!DOCTYPE html>
<html>
<head>
<style>

body{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#d9f2ff;
  margin:0;
}

.panda{
  width:250px;
  height:250px;
  background:white;
  border-radius:50%;
  position:relative;
}

/* Ears */
.ear{
  width:80px;
  height:80px;
  background:black;
  border-radius:50%;
  position:absolute;
  top:-20px;
}

.left-ear{
  left:10px;
}

.right-ear{
  right:10px;
}

/* Eyes */
.eye{
  width:50px;
  height:70px;
  background:black;
  border-radius:50%;
  position:absolute;
  top:70px;
}

.left-eye{
  left:45px;
}

.right-eye{
  right:45px;
}

/* Eye shine */
.inner-eye{
  width:20px;
  height:20px;
  background:white;
  border-radius:50%;
  margin:20px auto;
}

/* Nose */
.nose{
  width:30px;
  height:20px;
  background:black;
  border-radius:50%;
  position:absolute;
  top:140px;
  left:110px;
}

/* Mouth */
.mouth{
  width:60px;
  height:30px;
  border:5px solid black;
  border-top:none;
  border-left:none;
  border-right:none;
  border-radius:0 0 50px 50px;
  position:absolute;
  top:165px;
  left:90px;
}

</style>
</head>

<body>

<div class="panda">

  <!-- Ears -->
  <div class="ear left-ear"></div>
  <div class="ear right-ear"></div>

  <!-- Eyes -->
  <div class="eye left-eye">
    <div class="inner-eye"></div>
  </div>

  <div class="eye right-eye">
    <div class="inner-eye"></div>
  </div>

  <!-- Nose -->
  <div class="nose"></div>

  <!-- Mouth -->
  <div class="mouth"></div>

</div>

</body>
</html>
