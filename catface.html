<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catface</title>
    <style>
        body{
             background-color:#ffe6e6;
        }
        h1{
            text-align:center;
            margin-top:40px;
        }
        div{
            display:flex;
            align-items:center;
            justify-content:center;
           
        }
       
        .face{
            background-color:#ffb366;
            width:250px;
            height:250px;
            border-radius:50%;
            margin-top:150px;
            position:relative;

        }
        .left-ear{
            width:70px;
            height:70px;
            background-color:#ffb366;
            position:absolute;
            top:-20px;
            left:20px;
            transform:rotate(49deg);
        }
        .right-ear{
            width:70px;
            height:70px;
            background-color:#ffb366;
            position:absolute;
            top:-20px;
            right:20px;
            transform:rotate(49deg);
        }
        .left-eye{
            width:30px;
            height:40px;
            background-color:black;
            border-radius:50%;
            position:absolute;
            top:80px;
            left:60px;
        }
        .right-eye{
            width:30px;
            height:40px;
            background-color:black;
            border-radius:50%;
            position:absolute;
            top:80px;
            right:60px;
        }
        .nose{
            width:30px;
            height:30px;
            background-color:pink;
            position:absolute;
            top:130px;
            left:110px;
            transform:rotate(45deg);
        }
        .mouth{
            width:50px;
            height:25px;
            border:5px solid black;
            border-top:none;
            border-left:none;
            border-right:none;
           position:absolute;
           top:160px;
           left:100px;
           border-radius:0px 0px 50px 50px ;
         }
    </style>
</head>
<body>
    <h1>Eat. Sleep. Meow. Repeat.</h1>
    <div class="cat">
        <div class="face">
            <div class="left-ear"></div>
            <div class="right-ear"></div>
            <div class="left-eye"></div>
            <div class="right-eye"></div>
            <div class="nose"></div>
            <div class="mouth"></div>
        </div>
    </div>
</body>
</html>
