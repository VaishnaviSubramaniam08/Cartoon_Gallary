<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mickey Mouse Face</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#8fd3ff;
    }

    /* MAIN FACE */

    .face{
      width:260px;
      height:260px;
      background:black;
      border-radius:50%;
      position:relative;
    }

    /* EARS */

    .ear{
      width:130px;
      height:130px;
      background:black;
      border-radius:50%;
      position:absolute;
      z-index:-1;
    }

    .left-ear{
      top:-40px;
      left:-70px;
    }

    .right-ear{
      top:-40px;
      right:-70px;
    }

    /* SKIN AREA */

    .skin{
      width:180px;
      height:170px;
      background:#ffe0bd;
      border-radius:50%;
      position:absolute;
      bottom:20px;
      left:40px;
    }

    /* EYES */

    .eye{
      width:30px;
      height:60px;
      background:white;
      border-radius:50%;
      position:absolute;
      top:45px;
      z-index:2;
    }

    .left-eye{
      left:80px;
    }

    .right-eye{
      right:80px;
    }

    /* PUPILS */

    .pupil{
      width:12px;
      height:20px;
      background:black;
      border-radius:50%;
      position:absolute;
      bottom:10px;
      left:9px;
    }

    /* NOSE */

    .nose{
      width:55px;
      height:40px;
      background:black;
      border-radius:50%;
      position:absolute;
      top:110px;
      left:102px;
      z-index:2;
    }

    /* MOUTH */

    .mouth{
      width:110px;
      height:55px;
      border-bottom:6px solid black;
      border-radius:0 0 100px 100px;
      position:absolute;
      bottom:40px;
      left:75px;
      z-index:2;
    }

    /* TONGUE */

    .tongue{
      width:40px;
      height:20px;
      background:pink;
      border-radius:0 0 50px 50px;
      position:absolute;
      bottom:0;
      left:35px;
    }

    /* SMILE CURVES */

    .smile-line{
      width:35px;
      height:20px;
      border-top:4px solid black;
      border-radius:50%;
      position:absolute;
      top:138px;
      z-index:2;
    }

    .left-line{
      left:72px;
      transform:rotate(-20deg);
    }

    .right-line{
      right:72px;
      transform:rotate(20deg);
    }

  </style>
</head>

<body>

  <div class="face">

    <!-- EARS -->
    <div class="ear left-ear"></div>
    <div class="ear right-ear"></div>

    <!-- SKIN -->
    <div class="skin"></div>

    <!-- EYES -->
    <div class="eye left-eye">
      <div class="pupil"></div>
    </div>

    <div class="eye right-eye">
      <div class="pupil"></div>
    </div>

    <!-- NOSE -->
    <div class="nose"></div>

    <!-- SMILE LINES -->
    <div class="smile-line left-line"></div>
    <div class="smile-line right-line"></div>

    <!-- MOUTH -->
    <div class="mouth">
      <div class="tongue"></div>
    </div>

  </div>

</body>
</html>
