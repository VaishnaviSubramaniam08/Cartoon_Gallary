<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minion Face</title>
    <style>
        h1{
            margin-top:60px;
            text-align:center;
        }
        .minion{
            
            margin:20px auto;
            width:200px;
            height:350px;
            background-color:yellow;
            border-radius:100px;
            position:relative;
        }
        .eye{
            width:80px;
            height:80px;
            background-color:white;
            border:8px solid gray;
            border-radius:50%;
            position:absolute;
            top:50px;
            left:55px;
        }
        .black{
            width:30px;
            height:30px;
            background-color:black;
            border-radius:50%;
            position:absolute;
            top:25px;
            left:25px;
        }
        .mouth{
            width:90px;
            height:40px;
            border:6px solid black;
            border-top:none;
            border-left:none;
            border-right:none;
            border-radius:0 0 100px 100px;
            position:absolute;
            top:170px;
            left:55px;
        }
        .pant{
            width:200px;
            height:100px;
            background-color:blue;
            position:absolute;
            bottom:0px;
            border-radius:0 0 100px 100px;
        }
    </style>
</head>
<body>
    <h1>Smile like a Minion!</h1>
    <div class="minion">
        <div class="eye">
                <div class="black">

                </div>
        </div>
        <div class="mouth"></div>
        <div class="pant"></div>
    </div>
</body>
</html>
