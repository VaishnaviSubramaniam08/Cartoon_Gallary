<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartoon house</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            background: linear-gradient(skyblue, #dff6ff);
            align-items: flex-end;
            position: relative;
            overflow: hidden;
        }

        .sun {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: yellow;
            position: absolute;
            top: 50px;
            right: 80px;
            box-shadow: 0 0 50px yellow;
        }

        .cloud {
            width: 130px;
            height: 70px;
            background-color: white;
            border-radius: 50px;
            position: absolute;
        }

        .cloud::before,
        .cloud::after {
            content: "";
            position: absolute;
            background-color: white;
            border-radius: 50%;
        }

        .cloud::before {
            width: 60px;
            height: 60px;
            top: -25px;
            left: 50px;
        }

        .cloud::after {
            width: 70px;
            height: 70px;
            top: -35px;
            right: 50px
        }

        .cloud1 {
            top: 80px;
            left: 100px;
        }

        .cloud2 {
            top: 200px;
            right: 300px;
        }

        .ground {
            width: 100%;
            background-color: green;
            height: 180px;
            bottom: 0;
            position: absolute;
        }

        .house {
            position: relative;
            margin-bottom: 180px;
        }

        .roof {
            width: 0;
            height: 0;
            border-left: 180px solid transparent;
            border-right: 180px solid transparent;
            border-bottom: 150px solid #8b4513;
            position: absolute;
            top: -150px;
            left: -30px;
        }

        .chimney {
            width: 45px;
            height: 100px;
            background: #a52a2a;
            position: absolute;
            top: -120px;
            right: 30px;
            border-radius: 5px;
        }

        .main {
            width: 300px;
            height: 220px;
            background: #ffd699;
            border: 5px solid #333;
            position: relative;
        }

        .window {
            width: 65px;
            height: 65px;
            background: #87ceeb;
            border: 4px solid #333;
            position: absolute;
            top: 45px;

        }

        .left-window {
            left: 30px;
        }

        .right-window {
            right: 30px;
        }

        .window::before {
            content: "";
            width: 4px;
            height: 100%;
            background: #333;
            position: absolute;
            left: 28px;
        }

        .window::after {
            content: "";
            width: 100%;
            height: 4px;
            background: #333;
            position: absolute;
            top: 28px;
        }

        .door {
            width: 75px;
            height: 120px;
            background: #5c3317;
            position: absolute;
            bottom: 0;
            left: 110px;
            border-radius: 10px 10px 0 0;
        }

        .knob {
            width: 10px;
            height: 10px;
            background: gold;
            border-radius: 50%;
            position: absolute;
            right: 10px;
            top: 60px;
        }

        .path {
            width: 90px;
            height: 150px;
            background: #d2b48c;
            position: absolute;
            bottom: -150px;
            left: 100px;
        }

        .tree {
            position: absolute;
            left: -170px;
            bottom: 0;
        }

        .leaves {
            width: 120px;
            height: 120px;
            background: rgb(39, 120, 39);
            border-radius: 50%;
            position: absolute;
            bottom: 80px;
            left: -40px;
        }

        .trunk {
            width: 40px;
            height: 100px;
            background: brown;
        }

        .flower {
            width: 15px;
            height: 15px;
            background: pink;
            border-radius: 50%;
            position: absolute;
            bottom: 20px;
        }
        .flower1{
            left:100px;
        }
        .flower2{
            right:120px;
        }
        .flower3{
            left:190px;
        }
    </style>
</head>

<body>
    <div class="sun"></div>
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="ground">
        <div class="flower flower1"></div>
        <div class="flower flower2"></div>
        <div class="flower flower3"></div>
    </div>
    <div class="house">
        <div class="roof"></div>
        <div class="chimney"></div>
        <div class="main">
            <div class="window left-window"></div>
            <div class="window right-window"></div>
            <div class="door">
                <div class="knob"></div>
            </div>
            <div class="path"></div>
        </div>
        <div class="tree">
            <div class="trunk"></div>
            <div class="leaves"></div>
        </div>
        
    </div>
</body>

</html>
